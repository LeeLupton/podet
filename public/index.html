<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e1410" />
    <meta
      name="description"
      content="PodNet — a neighborhood gig and improvement board. Post small cash gigs, claim work nearby, and build a portfolio of finished jobs."
    />
    <title>PodNet — Neighborhood Gigs</title>

    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Sets the theme on <html> before paint (no flash); see public/js/theme.js. -->
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/app.css" />
  </head>

  <body>
    <noscript>
      <p class="noscript">PodNet needs JavaScript — please enable it and reload.</p>
    </noscript>

    <!-- Signed-out gate (login / register) -->
    <div id="auth-gate" class="hidden"></div>

    <!-- App views -->
    <main id="app" class="hidden">
      <section id="view-nearby" class="view"></section>
      <section id="view-board" class="view hidden"></section>
      <section id="view-search" class="view hidden"></section>
      <section id="view-post" class="view hidden"></section>
      <section id="view-me" class="view hidden"></section>
    </main>

    <!-- Fixed bottom tab bar -->
    <nav id="tabbar" class="hidden" aria-label="Primary">
      <button class="tab" data-tab="nearby">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        Nearby
      </button>
      <button class="tab" data-tab="board">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>
        Board
      </button>
      <button class="tab" data-tab="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        Search
      </button>
      <button class="tab" data-tab="post">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Post
      </button>
      <button class="tab" data-tab="me">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-6.5 8-6.5s8 2.5 8 6.5"/></svg>
        Me
      </button>
    </nav>

    <div id="toast-root"></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
