<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e1410" />
    <title>PodNet — Neighborhood Gigs</title>

    <!-- Tailwind v3 Play CDN: no build step. Theme tokens mapped to utility colors. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: '#0e1410',
              panel: '#161e18',
              border: '#2a3530',
              accent: '#7cb342',
              warning: '#f59e0b',
              ink: '#d8e0d8',
            },
          },
        },
      }
    </script>

    <style>
      /* Theme tokens — defined once. */
      :root {
        --bg: #0e1410;
        --panel: #161e18;
        --border: #2a3530;
        --accent: #7cb342;
        --warning: #f59e0b;
        --text: #d8e0d8;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 16px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      .hidden { display: none !important; }

      /* App shell: a centered mobile column with room for the fixed tab bar. */
      #app, #auth-gate {
        max-width: 560px;
        margin: 0 auto;
        padding: 16px 16px calc(84px + env(safe-area-inset-bottom));
      }
      #auth-gate {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .view { display: flex; flex-direction: column; gap: 14px; }

      /* Cards & panels */
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        width: 100%;
        text-align: left;
      }
      .list { display: flex; flex-direction: column; gap: 12px; }

      /* Typography */
      .screen-title { font-size: 22px; font-weight: 700; margin: 4px 0 8px; }
      .section-title { font-size: 18px; font-weight: 700; margin: 18px 0 6px; }
      .subhead { font-size: 14px; text-transform: uppercase; letter-spacing: .04em; opacity: .7; margin: 12px 0 4px; }
      .hint { font-size: 14px; opacity: .7; margin: 0 0 4px; }

      /* Inputs */
      .input {
        width: 100%;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 16px;
        margin: 0;
      }
      .input:focus { outline: 2px solid var(--accent); outline-offset: 0; }
      textarea.input { resize: vertical; }
      .form { display: flex; flex-direction: column; gap: 12px; }
      .lbl { display: flex; flex-direction: column; gap: 6px; font-size: 14px; }
      .lbl > span:first-child { opacity: .8; }
      .row { display: flex; gap: 12px; }
      .row > * { flex: 1; }
      .loc { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      .pin-label { font-size: 14px; opacity: .8; }

      /* Buttons — touch targets ≥44px */
      .btn-primary {
        min-height: 48px;
        background: var(--accent);
        color: #0c130a;
        font-weight: 700;
        font-size: 16px;
        border: none;
        border-radius: 12px;
        padding: 12px 18px;
        width: 100%;
        cursor: pointer;
      }
      .btn-primary:disabled { opacity: .6; cursor: default; }
      .btn-primary.claimed { background: var(--border); color: var(--text); }
      .btn-ghost {
        min-height: 44px;
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 15px;
        cursor: pointer;
      }
      .btn-ghost.on { border-color: var(--accent); color: var(--accent); }
      .btn-ghost.danger, .link-btn.danger { color: var(--warning); }
      .link-btn {
        background: none; border: none; color: var(--accent);
        cursor: pointer; font-size: 14px; padding: 4px; text-decoration: underline;
      }

      /* Gig cards */
      .gig-card { cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
      .payout { font-size: 26px; font-weight: 800; color: var(--accent); line-height: 1.1; }
      .payout-lg { font-size: 34px; }
      .gig-title { font-size: 20px; font-weight: 600; }
      .gig-meta { font-size: 14px; opacity: .8; }
      .gig-desc { font-size: 16px; margin: 12px 0; white-space: pre-wrap; }
      .map-link { display: inline-block; text-decoration: none; margin: 4px 0; }
      .gig-row { display: flex; flex-direction: column; gap: 6px; }
      .gig-row-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }

      .pill { font-size: 12px; text-transform: lowercase; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border); }
      .pill-available { color: var(--accent); border-color: var(--accent); }
      .pill-claimed { color: var(--warning); border-color: var(--warning); }
      .pill-completed { opacity: .6; }

      /* Feed header / radius slider */
      .feed-header {
        position: sticky; top: 0; z-index: 5;
        background: var(--bg); padding: 8px 0 12px; display: flex; flex-direction: column; gap: 8px;
        border-bottom: 1px solid var(--border);
      }
      .radius-row { display: flex; justify-content: space-between; align-items: baseline; }
      .radius-label { font-size: 14px; opacity: .8; }
      .radius-val { font-size: 18px; font-weight: 700; color: var(--accent); }
      .slider { width: 100%; accent-color: var(--accent); height: 36px; }

      /* Sheet / modal */
      .backdrop {
        position: fixed; inset: 0; background: rgba(0,0,0,.55);
        display: flex; align-items: flex-end; justify-content: center; z-index: 50;
      }
      .sheet {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 18px 18px 0 0; width: 100%; max-width: 560px;
        padding: 20px 18px calc(24px + env(safe-area-inset-bottom));
        max-height: 88vh; overflow-y: auto;
      }
      .sheet-body { display: flex; flex-direction: column; gap: 8px; }

      /* Rate panel */
      .rate-panel { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; display: flex; flex-direction: column; gap: 10px; }
      .rate-head { font-size: 15px; opacity: .9; }
      .stars-row { display: flex; gap: 6px; }
      .star {
        font-size: 30px; line-height: 1; background: none; border: none;
        color: var(--border); cursor: pointer; padding: 4px; min-width: 44px; min-height: 44px;
      }
      .star.star-on { color: var(--accent); }

      /* Board */
      .post-card { cursor: default; }
      .post-head { display: flex; gap: 10px; align-items: baseline; cursor: pointer; flex-wrap: wrap; }
      .post-author { font-weight: 700; }
      .post-area { font-size: 13px; opacity: .7; }
      .post-body { margin: 8px 0; cursor: pointer; white-space: pre-wrap; }
      .post-counts { font-size: 13px; opacity: .7; cursor: pointer; }
      .post-expand { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; display: flex; flex-direction: column; gap: 12px; }
      .post-actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .comments { display: flex; flex-direction: column; gap: 8px; }
      .comment { font-size: 15px; display: flex; flex-wrap: wrap; gap: 6px; align-items: baseline; }
      .comment-author { font-weight: 600; }
      .comment-body { flex: 1 1 100%; }
      .comment-date { font-size: 12px; opacity: .6; }
      .comment-form { display: flex; gap: 8px; }
      .comment-form .input { flex: 1; }

      /* Me view */
      .me-head { display: flex; flex-direction: column; gap: 14px; }
      .me-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
      .me-name { font-size: 22px; font-weight: 700; margin: 0; }
      .me-stats { display: flex; gap: 28px; }
      .stat-big { font-size: 32px; font-weight: 800; color: var(--accent); line-height: 1; }
      .stat-label { font-size: 13px; opacity: .75; margin-top: 4px; }
      .me-section { display: flex; flex-direction: column; gap: 10px; }
      .review-top { display: flex; justify-content: space-between; align-items: baseline; }
      .review-stars { color: var(--accent); font-size: 18px; letter-spacing: 2px; }
      .review-date { font-size: 13px; opacity: .6; }
      .review-body { margin: 8px 0 4px; white-space: pre-wrap; }
      .review-by { font-size: 14px; opacity: .75; }

      /* Auth */
      .auth-card { display: flex; flex-direction: column; gap: 14px; max-width: 380px; }
      .brand { font-size: 30px; font-weight: 800; color: var(--accent); margin: 0; text-align: center; }
      .tagline { text-align: center; opacity: .8; margin: -6px 0 6px; font-size: 15px; }

      /* States */
      .state { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 28px 12px; text-align: center; opacity: .9; }
      .spin { width: 26px; height: 26px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Tab bar */
      #tabbar {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
        background: var(--panel); border-top: 1px solid var(--border);
        display: flex; justify-content: space-around;
        padding-bottom: env(safe-area-inset-bottom);
      }
      #tabbar .tab {
        flex: 1; min-height: 60px; background: none; border: none; color: var(--text);
        opacity: .65; font-size: 12px; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 3px; cursor: pointer;
      }
      #tabbar .tab .ico { font-size: 20px; line-height: 1; }
      #tabbar .tab-on { opacity: 1; color: var(--accent); }

      /* Toasts */
      #toast-root { position: fixed; left: 0; right: 0; bottom: calc(76px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 60; pointer-events: none; }
      .toast {
        background: var(--panel); border: 1px solid var(--accent); color: var(--text);
        padding: 10px 16px; border-radius: 10px; font-size: 14px; max-width: 90%;
        box-shadow: 0 6px 20px rgba(0,0,0,.4); transition: opacity .3s, transform .3s;
      }
      .toast-out { opacity: 0; transform: translateY(8px); }
    </style>
  </head>

  <body>
    <!-- Signed-out gate (login / register) -->
    <div id="auth-gate" class="hidden"></div>

    <!-- App views -->
    <main id="app" class="hidden">
      <section id="view-nearby" class="view"></section>
      <section id="view-board" class="view hidden"></section>
      <section id="view-post" class="view hidden"></section>
      <section id="view-me" class="view hidden"></section>
    </main>

    <!-- Fixed bottom tab bar -->
    <nav id="tabbar" class="hidden" aria-label="Primary">
      <button class="tab" data-tab="nearby"><span class="ico">📍</span>Nearby</button>
      <button class="tab" data-tab="board"><span class="ico">📋</span>Board</button>
      <button class="tab" data-tab="post"><span class="ico">＋</span>Post</button>
      <button class="tab" data-tab="me"><span class="ico">🙂</span>Me</button>
    </nav>

    <div id="toast-root"></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
