# Cloudflare Pages project config.
#
# NO SECRETS LIVE HERE. SESSION_SECRET and any API tokens are set as Pages
# environment secrets (`wrangler pages secret put SESSION_SECRET`) or in the
# dashboard — never in this file, never in the repo. For local `wrangler dev`,
# secrets go in `.dev.vars`, which is git-ignored.

name = "podnet"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

# D1 database binding — exposed to Functions as `env.DB`.
# Replace database_id with the id printed by `wrangler d1 create podnet`.
[[d1_databases]]
binding = "DB"
database_name = "podnet"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
